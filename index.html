<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#152849" />
<title>Lumexa × Nirvana — Live KPIs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --lumexa-navy: #1F3A6B;
    --lumexa-navy-deep: #152849;
    --lumexa-cyan: #4AB5D4;
    --lumexa-cyan-soft: #D8ECF4;
    --lumexa-cyan-deep: #2B8BAB;

    --nirvana-purple: #3F2D6E;
    --nirvana-purple-soft: #EDE8F6;
    --nirvana-violet: #7C6CC4;

    --c-denial: #E56B5A;
    --c-rejection: #E8A33D;
    --c-prefile: #4AB5D4;

    --ink: #0E1626;
    --ink-2: #344054;
    --ink-3: #5C6B82;
    --ink-4: #8A97AB;
    --line: #E4E8EF;
    --line-soft: #F0F2F6;
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --surface-warm: #FAFBFC;

    --success: #0E7F4A;
    --success-soft: #E2F3EA;
    --danger: #B23B2B;
    --danger-soft: #FBE8E4;

    --sans: 'Geist', system-ui, -apple-system, sans-serif;
    --mono: 'Geist Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

  html, body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.45;
    overflow-x: hidden;
  }

  button { font-family: var(--sans); -webkit-tap-highlight-color: transparent; }
  input, select { font-family: var(--sans); }

  /* ====== Topbar ====== */
  .topbar {
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 40;
  }
  .topbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .brand-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .brand-logo-lumexa {
    height: 32px;
    width: auto;
    display: block;
  }
  .brand-logo-nirvana {
    height: 16px;
    width: auto;
    display: block;
  }
  .brand-x {
    color: var(--ink-4);
    font-size: 14px;
    font-weight: 300;
  }
  .user-chip {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--lumexa-navy), var(--lumexa-cyan-deep));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 11px;
    flex-shrink: 0;
  }
  .topbar-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
  }
  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--success-soft);
    color: var(--success);
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 500;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }
  .ts-tick {
    font-family: var(--mono);
    color: var(--ink-4);
    letter-spacing: -0.02em;
  }

  /* ====== Tooltips ====== */
  .info-icon {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.2px solid var(--ink-4);
    color: var(--ink-4);
    font-size: 11px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: var(--sans);
    background: transparent;
    flex-shrink: 0;
    margin-left: 2px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .info-icon.open {
    border-color: var(--lumexa-navy);
    color: var(--lumexa-navy);
    background: var(--lumexa-cyan-soft);
  }
  .hero-card-primary .info-icon {
    border-color: rgba(255, 255, 255, 0.55);
    color: rgba(255, 255, 255, 0.85);
  }
  .hero-card-primary .info-icon.open {
    border-color: white;
    color: white;
    background: rgba(255, 255, 255, 0.18);
  }

  .tip-popover {
    position: fixed;
    background: var(--ink);
    color: white;
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 400;
    line-height: 1.45;
    max-width: 260px;
    min-width: 200px;
    z-index: 9999;
    font-family: var(--sans);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    pointer-events: none;
  }
  .tip-popover::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ink);
  }

  /* ====== Container ====== */
  .container {
    padding: 16px 14px 40px;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ====== Page header ====== */
  .page-header {
    margin-bottom: 16px;
  }
  .page-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--lumexa-cyan-deep);
    margin-bottom: 4px;
  }
  .page-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 24px;
    line-height: 1.15;
    color: var(--lumexa-navy-deep);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .page-sub {
    font-size: 13px;
    color: var(--ink-3);
    line-height: 1.45;
  }

  /* ====== Ribbon ====== */
  .ribbon {
    background: linear-gradient(90deg, rgba(74, 181, 212, 0.10), rgba(63, 45, 110, 0.06));
    border: 1px solid var(--lumexa-cyan-soft);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 16px;
  }
  .ribbon-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--lumexa-navy);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .ribbon-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .ribbon-sub {
    font-size: 11.5px;
    color: var(--ink-3);
    line-height: 1.35;
  }
  .ribbon-sub strong { color: var(--lumexa-cyan-deep); font-weight: 600; }

  /* ====== Hero KPIs ====== */
  .hero-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .hero-card-primary {
    background: linear-gradient(135deg, #152849 0%, #1F3A6B 60%, #2B5A88 100%);
    color: white;
    border-radius: 14px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .hero-card-primary::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74, 181, 212, 0.35) 0%, transparent 70%);
  }
  .hero-card-secondary {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .kpi-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-4);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 8px;
  }
  .hero-card-primary .kpi-label {
    color: rgba(255, 255, 255, 0.7);
  }
  .kpi-value {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 32px;
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--lumexa-navy-deep);
    font-variant-numeric: tabular-nums;
    position: relative;
    z-index: 2;
  }
  .hero-card-primary .kpi-value { color: white; }
  .kpi-delta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
    position: relative;
    z-index: 2;
  }
  .delta-pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .delta-pill.positive {
    background: var(--success-soft);
    color: var(--success);
  }
  .delta-pill.negative {
    background: var(--danger-soft);
    color: var(--danger);
  }
  .hero-card-primary .delta-pill.positive {
    background: rgba(46, 204, 113, 0.22);
    color: #6EE7B7;
  }
  .hero-card-primary .delta-pill.negative {
    background: rgba(231, 107, 90, 0.25);
    color: #FBBFB0;
  }
  .delta-context {
    font-size: 11px;
    color: var(--ink-4);
    font-weight: 500;
  }
  .hero-card-primary .delta-context {
    color: rgba(255, 255, 255, 0.65);
  }

  /* ====== Quarter filter scroller ====== */
  .quarter-scroller {
    display: flex;
    gap: 5px;
    margin-bottom: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    position: relative;
    z-index: 2;
  }
  .quarter-scroller::-webkit-scrollbar { display: none; }
  .quarter-chip {
    padding: 6px 11px;
    border-radius: 7px;
    font-size: 11.5px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.65);
    background: rgba(255, 255, 255, 0.08);
    border: none;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .quarter-chip.active {
    background: white;
    color: var(--lumexa-navy);
  }

  /* ====== Section ====== */
  .section {
    margin-bottom: 20px;
  }
  .section-head {
    margin-bottom: 10px;
  }
  .section-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--lumexa-cyan-deep);
    margin-bottom: 2px;
  }
  .section-title {
    font-size: 19px;
    font-weight: 700;
    color: var(--lumexa-navy-deep);
    letter-spacing: -0.015em;
  }

  /* ====== Filter chips (horizontal scroll) ====== */
  .filter-scroller {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding: 4px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 10px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .filter-scroller::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 7px 11px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-3);
    background: transparent;
    border: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .filter-chip.active {
    background: var(--lumexa-navy);
    color: white;
  }
  .filter-chip.custom {
    color: var(--lumexa-cyan-deep);
    font-style: italic;
  }

  /* ====== Mini KPI grid (2x2) ====== */
  .mini-kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mini-kpi {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .mini-kpi-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 4px;
  }
  .mini-kpi-value {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--lumexa-navy-deep);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .mini-kpi-value .suffix {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
    margin-left: 2px;
  }
  .mini-kpi-delta {
    font-size: 10.5px;
    color: var(--success);
    font-weight: 500;
    margin-top: 4px;
    display: inline-flex;
    align-items: center;
    gap: 2px;
  }

  /* ====== Phase accordion ====== */
  .phase-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .phase-header-btn {
    width: 100%;
    padding: 14px 14px;
    background: white;
    border: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    cursor: pointer;
    text-align: left;
  }
  .phase-header-btn.open {
    border-bottom: 1px solid var(--line-soft);
  }
  .phase-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .phase-swatch {
    width: 4px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .phase-swatch.denial { background: var(--c-denial); }
  .phase-swatch.rejection { background: var(--c-rejection); }
  .phase-swatch.prefile { background: var(--c-prefile); }
  .phase-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--lumexa-navy-deep);
    letter-spacing: -0.01em;
  }
  .phase-meta {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .phase-meta strong {
    color: var(--success);
    font-weight: 600;
  }
  .chevron {
    width: 16px; height: 16px;
    border-right: 2px solid var(--ink-4);
    border-bottom: 2px solid var(--ink-4);
    transform: rotate(45deg);
    transition: transform 0.2s ease;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .phase-header-btn.open .chevron {
    transform: rotate(-135deg);
    margin-top: 4px;
  }
  .phase-body {
    padding: 12px 14px 14px;
  }

  /* ====== Breakdown list ====== */
  .breakdown-section {
    margin-top: 12px;
  }
  .breakdown-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--lumexa-cyan-deep);
    margin-bottom: 8px;
  }
  .code-row {
    display: grid;
    grid-template-columns: 1fr auto;
    row-gap: 4px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .code-row:last-child { border-bottom: none; }
  .code-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .code-tag {
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 700;
    color: var(--lumexa-navy-deep);
    white-space: nowrap;
    letter-spacing: -0.01em;
    flex-shrink: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .code-value {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--lumexa-navy-deep);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .code-desc {
    font-size: 10.5px;
    color: var(--ink-3);
    line-height: 1.3;
    margin-top: 1px;
  }
  .code-bar-wrap {
    grid-column: 1 / -1;
    height: 5px;
    background: var(--line-soft);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }
  .code-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .code-bar.denial { background: var(--c-denial); }
  .code-bar.rejection { background: var(--c-rejection); }
  .code-bar.prefile { background: var(--c-prefile); }

  /* ====== Fix callouts (mobile: compact) ====== */
  .fix-callout {
    background: var(--nirvana-purple-soft);
    border-left: 3px solid var(--nirvana-purple);
    padding: 8px 10px;
    border-radius: 0 7px 7px 0;
    margin-top: 8px;
  }
  .fix-callout-head {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--nirvana-purple);
    margin-bottom: 3px;
  }
  .fix-callout-body {
    font-size: 11.5px;
    color: var(--ink-2);
    line-height: 1.4;
  }

  /* ====== Summary bar card (mobile) ====== */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .summary-card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--lumexa-navy-deep);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .summary-card-sub {
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 10px;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 1fr auto;
    row-gap: 3px;
    padding: 6px 0;
  }
  .scale-marker {
    font-size: 9.5px;
    font-family: var(--mono);
    color: var(--ink-4);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 6px;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line-soft);
  }
  .bar-row:first-child { padding-top: 0; }
  .bar-row-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .bar-row-label {
    font-size: 12px;
    color: var(--ink-2);
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
    min-width: 0;
  }
  .bar-row-value {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--lumexa-navy-deep);
    flex-shrink: 0;
  }
  .bar-row-bar {
    grid-column: 1 / -1;
    height: 6px;
    background: var(--line-soft);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 3px;
  }
  .bar-row-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* Group label */
  .group-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--lumexa-cyan-deep);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 18px 0 8px;
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 10.5px;
    color: var(--ink-4);
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* =========================================================================
   DATA (shared with desktop)
   ========================================================================= */

const LEAKAGE_BY_QUARTER = {
  'FY 2025':  { value: 2650000,  yoyPct: null,  sub: 'Full year baseline'  },
  'Q1 2026':  { value: 683000,   yoyPct: +3.1,  sub: 'vs. Q1 2025 ($663K) · pre-Nirvana' },
  'Q2 2026':  { value: 700000,   yoyPct: +4.5,  sub: 'vs. Q2 2025 ($670K) · Phase 1A go-live' },
  'Q3 2026':  { value: 469000,   yoyPct: -30.0, sub: 'vs. Q3 2025 ($670K) · all phases live' },
  'Q4 2026':  { value: 414000,   yoyPct: -37.9, sub: 'vs. Q4 2025 ($667K) · pre-intake expansion' },
};

const EOY_PROJ = { value: 2266000, deltaAbs: 384000, deltaPct: 14.5 };

const WINDOW_BASELINE = {
  '24h':    { months: 1/30, label: '24h' },
  'week':   { months: 0.23, label: 'Week' },
  '2weeks': { months: 0.46, label: '2 wks' },
  'month':  { months: 1,    label: 'Month' },
  'since':  { months: 2.3,  label: 'Since' },

/* ===== InfoIcon tooltip ===== */
function InfoIcon({ tip }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({ top: 0, left: 0 });
  const ref = React.useRef(null);

  const toggle = (e) => {
    e.stopPropagation();
    if (!open && ref.current) {
      const rect = ref.current.getBoundingClientRect();
      setPos({ top: rect.top - 8, left: rect.left + rect.width / 2 });
    }
    setOpen(!open);
  };

  useEffect(() => {
    if (!open) return;
    const close = () => setOpen(false);
    window.addEventListener('click', close);
    window.addEventListener('scroll', close, true);
    return () => {
      window.removeEventListener('click', close);
      window.removeEventListener('scroll', close, true);
    };
  }, [open]);

  return (
    <React.Fragment>
      <span
        ref={ref}
        className={`info-icon ${open ? 'open' : ''}`}
        onClick={toggle}
        role="button"
      >i</span>
      {open && (
        <div
          className="tip-popover"
          style={{
            top: pos.top,
            left: pos.left,
            transform: 'translate(-50%, -100%)',
          }}
        >
          {tip}
        </div>
      )}
    </React.Fragment>
  );
}

/* ===== Helpers ===== */
function fmtNum(n, opts = {}) {
  const { decimals = 0, compact = false } = opts;
  if (compact && Math.abs(n) >= 1_000_000) return (n / 1_000_000).toFixed(decimals || 2) + 'M';
  if (compact && Math.abs(n) >= 1_000) return (n / 1_000).toFixed(decimals || 1) + 'K';
  return n.toLocaleString('en-US', { maximumFractionDigits: decimals, minimumFractionDigits: decimals });
}
function fmtMoney(n, opts = {}) {
  const { compact = false } = opts;
  if (compact) {
    if (Math.abs(n) >= 1_000_000) return '$' + (n / 1_000_000).toFixed(2) + 'M';
    if (Math.abs(n) >= 1_000) return '$' + (n / 1_000).toFixed(0) + 'K';
  }
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function SummaryBars({ title, subtitle, data, color, total, window, setWindow }) {
  const sumShares = data.reduce((acc, d) => acc + d.share, 0);
  const normalized = data.map(d => ({ ...d, share: d.share / sumShares }));
  const maxShare = Math.max(...normalized.map(d => d.share));
  const scaleMax = Math.ceil(maxShare * 10) / 10;
  return (
    <div className="summary-card">
      <div className="summary-card-title">{title}</div>
      <div className="summary-card-sub">{subtitle}</div>
      <FilterScroller options={SUMMARY_WINDOW_OPTIONS} value={window} onChange={setWindow} />
      <div className="scale-marker">0% — {(scaleMax * 100).toFixed(0)}% scale</div>
      {normalized.map(d => {
        const vol = Math.round(total * d.share);
        const pct = (d.share * 100).toFixed(1);
        const width = (d.share / scaleMax) * 100;
        return (
          <div className="bar-row" key={d.name}>
            <div className="bar-row-top">
              <div className="bar-row-label">{d.name}</div>
              <div className="bar-row-value">{fmtNum(vol, { compact: true })} · {pct}%</div>

            <div className="bar-row-bar">
              <div className="bar-row-fill" style={{ width: `${width}%`, background: color }}></div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

          <div className="user-chip">CR</div>
        </div>
        <div className="topbar-meta">
          <span className="live-pill">
            <span className="live-dot"></span>
            Live
          </span>
          <span className="ts-tick">{dateStr} · {timeStr}</span>
        </div>
      </div>

      <div className="container">
        <div className="page-header">
          <div className="page-eyebrow">Lumexa × Nirvana</div>
          <h1 className="page-title">RCM Impact Tracker</h1>
          <p className="page-sub">Real-time eligibility automation performance across all Lumexa sites.</p>
        </div>

        {/* Hero: Leakage + Projected */}
        <div className="section-head">
          <div className="section-eyebrow">Financial Impact</div>
          <div className="section-title">Live KPIs</div>
        </div>
        <div className="hero-stack">
          <HeroLeakage quarter={quarter} setQuarter={setQuarter} />
          <HeroProjected />
        </div>

        {/* Top KPIs */}
        <TopKPIs window={topWindow} setWindow={setTopWindow} />

        {/* Phase accordions */}
        <div className="section">
          <div className="section-head">
            <div className="section-eyebrow">Phase Breakdown</div>
            <div className="section-title">By Exception Type</div>
          </div>
          <PhaseAccordion
            type="denial"
            title="Denials"
            received={denials.received}
            automated={denials.automated}
            hoursSaved={denials.hoursSaved}
            costSaved={denials.costSaved}
            codes={DENIAL_CODES}
            window={denialWindow}
            setWindow={setDenialWindow}
            defaultOpen={true}
          />
          <PhaseAccordion
            type="rejection"
            title="Rejections"
            received={rejections.received}
            automated={rejections.automated}
            hoursSaved={rejections.hoursSaved}
            costSaved={rejections.costSaved}
            codes={REJECTION_REASONS}
            window={rejectWindow}
            setWindow={setRejectWindow}
          />
          <PhaseAccordion
            type="prefile"
            title="Pre-Filing Exceptions"
            received={prefile.received}
            automated={prefile.automated}
            hoursSaved={prefile.hoursSaved}
            costSaved={prefile.costSaved}
            codes={PREFILE_REASONS}
            window={prefileWindow}
            setWindow={setPrefileWindow}
          />
        </div>

        {/* Problem payers/offices */}
        <div className="section">
          <div className="section-head">
            <div className="section-eyebrow">Root Cause</div>
            <div className="section-title">Problem Payers &amp; Offices</div>
          </div>
          <div className="group-label">Denials</div>
          <SummaryBars
            title="Top Payers"
            subtitle="Carriers contributing to denial volume"
            data={getWindowData(DENIAL_PAYERS_BY_WINDOW, denialPayerWin)}
            color="var(--c-denial)"
            total={summaryTotals('denials', denialPayerWin)}
            window={denialPayerWin}
            setWindow={setDenialPayerWin}
          />
          <SummaryBars
            title="Top Offices"
            subtitle="Sites with highest denial concentration"
            data={getWindowData(DENIAL_OFFICES_BY_WINDOW, denialOfficeWin)}
            color="var(--lumexa-navy)"
            total={summaryTotals('denials', denialOfficeWin)}
            window={denialOfficeWin}
            setWindow={setDenialOfficeWin}
          />

          <div className="group-label">Rejections</div>
          <SummaryBars
            title="Top Payers"
            subtitle="Carriers generating clearinghouse rejections"
            data={getWindowData(REJECTION_PAYERS_BY_WINDOW, rejectPayerWin)}
            color="var(--c-rejection)"
            total={summaryTotals('rejections', rejectPayerWin)}
            window={rejectPayerWin}
            setWindow={setRejectPayerWin}
          />
          <SummaryBars
            title="Top Offices"
            subtitle="Sites with highest rejection concentration"
            data={getWindowData(REJECTION_OFFICES_BY_WINDOW, rejectOfficeWin)}
            color="var(--lumexa-cyan-deep)"
            total={summaryTotals('rejections', rejectOfficeWin)}
            window={rejectOfficeWin}
            setWindow={setRejectOfficeWin}
          />
        </div>

        <div className="footer">
          Lumexa × Nirvana · Live KPIs Tracker<br/>
          Data refreshed every 5 min
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
